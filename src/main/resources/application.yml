spring.application.name: VeloraX

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
