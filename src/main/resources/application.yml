spring.application.name: VeloraX

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  data:
    web:
      pageable:
        page-parameter: page
        size-parameter: pageSize
        one-indexed-parameters: true
        default-page-size: 10
        max-page-size: 100

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /api/swagger-ui
    operations-sorter: alpha
    tags-sorter: alpha
